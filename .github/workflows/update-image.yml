name: Update Image

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build even if version exists'
        required: false
        default: 'false'
        type: boolean
      target_version:
        description: 'Target version to build'
        required: false
        type: string
      publish_to_store:
        description: 'Publish to store after build'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version
        id: version
        run: |
          if [ -n "${{ inputs.target_version }}" ]; then
            VERSION="${{ inputs.target_version }}"
          else
            VERSION=$(curl -s https://api.github.com/repos/apache/airflow/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to LazyCat Registry
        uses: docker/login-action@v3
        with:
          registry: registry.lazycat.cloud
          username: ${{ secrets.LAZYCAT_REGISTRY_USER }}
          password: ${{ secrets.LAZYCAT_REGISTRY_PASSWORD }}

      - name: Pull and tag image
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          # Pull official image
          docker pull apache/airflow:${VERSION}
          
          # Tag for GHCR
          docker tag apache/airflow:${VERSION} ghcr.io/${{ github.repository }}:${VERSION}
          docker tag apache/airflow:${VERSION} ghcr.io/${{ github.repository }}:latest
          
          # Tag for LazyCat Registry
          docker tag apache/airflow:${VERSION} registry.lazycat.cloud/apache/airflow:${VERSION}
          docker tag apache/airflow:${VERSION} registry.lazycat.cloud/apache/airflow:latest
          
          # Push to GHCR
          docker push ghcr.io/${{ github.repository }}:${VERSION}
          docker push ghcr.io/${{ github.repository }}:latest
          
          # Push to LazyCat Registry
          docker push registry.lazycat.cloud/apache/airflow:${VERSION}
          docker push registry.lazycat.cloud/apache/airflow:latest

      - name: Update manifest version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/^version: .*/version: ${VERSION}/" lzc-manifest.yml
          sed -i "s|image: registry.lazycat.cloud/apache/airflow:.*|image: registry.lazycat.cloud/apache/airflow:${VERSION}|g" lzc-manifest.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lzc-manifest.yml
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update to version ${{ steps.version.outputs.version }}"
          git push

      - name: Output metadata
        run: |
          echo "source_version=${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "image=ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
